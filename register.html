<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | Roadmap Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Background */
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Register Card */
        .register-container {
            background: rgba(40, 40, 40, 0.95);
            padding: 40px;
            border-radius: 12px;
            width: 380px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        /* Heading */
        .register-container h2 {
            color: white;
            margin-bottom: 20px;
        }

        /* Input Fields */
        .input-box {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            outline: none;
            border-radius: 6px;
            background: #2f2f2f;
            color: white;
            font-size: 15px;
        }

        .input-box::placeholder {
            color: #aaa;
        }

        /* Button */
        .register-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-btn:hover {
            transform: scale(1.05);
        }

        /* Extra */
        .extra {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }

        .extra a {
            color: #4facfe;
            text-decoration: none;
        }

        .extra a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="register-container">

        <h2>Create Account</h2>

        <form onsubmit="register(event)">

            <input type="text" placeholder="Full Name" class="input-box" required>

            <input type="email" placeholder="Email Address" class="input-box" required>

            <input type="password" placeholder="Password" class="input-box" required>

            <input type="password" placeholder="Confirm Password" class="input-box" required>

            <button type="submit" class="register-btn">Register</button>

        </form>

        <div class="extra">
            Already have an account? <a href="login.html">Login</a>
        </div>

    </div>

    <script>

        function register(event) {

            event.preventDefault();

            const inputs = document.querySelectorAll(".input-box");

            const password = inputs[2].value;
            const confirmPassword = inputs[3].value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            alert("Registration Successful!");

            window.location.href = "login.html";
        }

    </script>

</body>

</html>
